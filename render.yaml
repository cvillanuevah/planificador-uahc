services:
  - type: web
    name: planificador-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: planificador-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

databases:
  - name: planificador-db
    databaseName: planificador
    user: planificador
    plan: free
