services:
  - type: web
    name: planificador-uahc
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LAKEBASE_INSTANCE
        value: planificador-uahc
      - key: LAKEBASE_HOST
        value: ep-floral-tooth-d8hrpj8t.database.us-east-2.cloud.databricks.com
      - key: LAKEBASE_PORT
        value: "5432"
      - key: LAKEBASE_DB
        value: planificador
      - key: FRONTEND_URL
        value: https://cvillanuevah.github.io
      - key: DATABRICKS_HOST
        value: https://dbc-0023d78e-9948.cloud.databricks.com
      - key: DATABRICKS_TOKEN
        sync: false
